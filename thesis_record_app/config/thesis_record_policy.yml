shared:
  policy_version: v1
  source_of_truth:
    rule: "Adjustable thresholds, cadence values, and operations defaults belong in this file before they are copied into app code or research workflow."
    docs_may_summarize: true
    docs_must_reference_this_file_for_current_values: true

  forecast_clock:
    measurement_atom: calendar_quarter
    first_measurement_period_rule: first_full_calendar_quarter_after_v0_internal_publication
    annual_snapshot_frequency_quarters: 4
    checkpoint_quarters_after_v0:
      v1: 12
      v2: 20
      v3: 40
    thesis_verdict_requires_scheduled_checkpoint: true
    quarterly_updates_are_verdicts: false

  scheduler:
    jobs:
      source_release_check:
        cron: "0 6 * * 1"
        queue: maintenance
        class_name: Evidence::SourceReleaseCheckJob
        description: "Weekly read-only source-release endpoint check; no ingestion."
      quarterly_indicator_checkpoint:
        cron: "0 6 1 1,4,7,10 *"
        queue: maintenance
        class_name: Evidence::QuarterlyIndicatorCheckpointJob
        description: "Quarterly measurement checkpoint scaffold; no analysis."
      annual_snapshot_candidate:
        cron: "0 6 15 1 *"
        queue: maintenance
        class_name: Evidence::AnnualSnapshotCandidateJob
        description: "Annual evidence snapshot candidate scaffold; no publication."
      production_summary_check:
        cron: "30 6 * * *"
        queue: maintenance
        class_name: Operations::ProductionSummaryCheckJob
        description: "Daily read-only production summary check; no ingestion."
      v0_readiness_check:
        cron: "45 6 * * *"
        queue: maintenance
        class_name: Operations::V0ReadinessCheckJob
        description: "Daily read-only Operator Nodes v0 readiness check; no publication."

  claim_review_gate_v1:
    status: design_only_disabled
    claim_reviews_authorized: false
    prediction_links_authorized: false
    automatic_claim_promotion_authorized: false
    evidence_status_change_authorized: false
    exports_authorized: false
    eligible_source_kinds_for_future_review:
      - census_bfs_api
      - census_susb_public_file
      - census_bds_public_file
    eligible_metric_review_statuses_for_future_review:
      - reviewed_context
    eligible_metric_source_statuses_for_future_review:
      - staged_context
      - reviewed_with_high_noise
    context_evidence_classes_excluded_from_automatic_claim_support:
      - indirect_payroll_transition_proxy_only
      - employer_side_context_only
      - employer_firm_dynamics_context_only
    blocked_prediction_ids:
      - TCE-P001
      - TCE-P002
      - TCE-P003
      - TCE-P004
      - TCE-P005
      - TCE-P006
      - TCE-P007
      - TCE-P008
      - TCE-P009
      - TCE-P010
      - TCE-P011
      - TCE-P012
    blocked_claim_ids:
      - TCE-CLAIM-001
      - TCE-CLAIM-002
      - TCE-CLAIM-003
      - TCE-CLAIM-004
      - TCE-CLAIM-005
      - TCE-CLAIM-006
      - TCE-CLAIM-007
      - TCE-CLAIM-008
      - TCE-CLAIM-009
      - TCE-CLAIM-010
      - TCE-CLAIM-011
      - TCE-CLAIM-012
      - TCE-CLAIM-013
      - TCE-CLAIM-014
      - TCE-CLAIM-015
    required_metadata_before_future_claim_review:
      - metric_observation_id
      - metric_quality_review_id
      - data_source_id
      - source_kind
      - source_status
      - metric_key
      - source_metric_status
      - quality_review_status
      - evidence_classification
      - prediction_id
      - claim_id
      - prior_claim_status
      - proposed_claim_status
      - source_limitations
      - disconfirming_alternatives
      - human_reviewer
      - authorization_record
      - paper_scope_effect
    prohibited_automatic_effects:
      - claim_status_change
      - prediction_link_creation
      - claim_review_creation
      - export_creation
      - paper_prose_change
      - thesis_verdict
      - ai_or_node_interpretation
      - nonemployer_conversion_interpretation
      - management_layer_interpretation
      - transaction_cost_interpretation
      - firm_boundary_conclusion

  claim_review_candidate_dry_run_v1:
    status: dry_run_only_no_records
    candidate_records_authorized: false
    database_writes_allowed: false
    claim_reviews_authorized: false
    prediction_links_authorized: false
    exports_authorized: false
    claim_status_effect: unchanged
    required_candidate_status: dry_run_candidate_only
    required_evidence_classification: context_only_not_claim_support
    allowed_review_statuses:
      - reviewed_context
    prohibited_outputs:
      - prediction_link_creation
      - claim_review_creation
      - claim_status_change
      - export_creation
      - paper_prose_change
      - thesis_verdict
    candidate_groups:
      - id: bfs_business_formation_context
        source_kind: census_bfs_api
        source_table: bfs_api_rows
        metric_keys:
          - bfs_business_applications
          - bfs_high_propensity_business_applications
          - bfs_business_formations_4q
          - bfs_business_formations_8q
          - bfs_projected_business_formations_4q
          - bfs_projected_business_formations_8q
        related_prediction_ids:
          - TCE-P009
          - TCE-P010
        related_claim_ids:
          - TCE-CLAIM-013
        candidate_status: dry_run_candidate_only
        evidence_classification: context_only_not_claim_support
        proposed_claim_status: unchanged
        limitation: "Employer formation proxy context only; not nonemployer conversion, AI adoption, Operator Node, or firm-boundary evidence."
      - id: susb_employer_size_context
        source_kind: census_susb_public_file
        source_table: susb_public_file_rows
        metric_keys:
          - susb_employer_firm_count
          - susb_employer_establishment_count
          - susb_employment
          - susb_annual_payroll_thousand
          - susb_receipts_thousand_economic_census_year
        related_prediction_ids:
          - TCE-P010
        related_claim_ids:
          - TCE-CLAIM-013
        candidate_status: dry_run_candidate_only
        evidence_classification: context_only_not_claim_support
        proposed_claim_status: unchanged
        limitation: "Employer-side size and payroll context only; no AI exposure, nonemployer, management-layer, or firm-boundary interpretation."
      - id: bds_employer_dynamics_context
        source_kind: census_bds_public_file
        source_table: bds_public_file_rows
        metric_keys:
          - bds_firms
          - bds_establishments
          - bds_employment
          - bds_establishment_entries
          - bds_establishment_exits
          - bds_firm_deaths
          - bds_job_creation
          - bds_job_destruction
          - bds_net_job_creation
          - bds_reallocation_rate
        related_prediction_ids:
          - TCE-P007
          - TCE-P009
          - TCE-P010
        related_claim_ids:
          - TCE-CLAIM-013
        candidate_status: dry_run_candidate_only
        evidence_classification: context_only_not_claim_support
        proposed_claim_status: unchanged
        limitation: "Employer firm-dynamics context only; no nonemployer, AI exposure, management-layer, transaction-cost, or firm-boundary interpretation."

  production_operations_v1:
    deployment_model: single_droplet_rails_postgresql_redis_sidekiq
    database_system_of_record: production_postgresql
    secrets_store: server_environment_or_managed_secret_store
    public_path_target: sourcegridlabs.com/thesis
    rails_relative_url_root: /thesis
    puma_port: 3400
    puma_bind: 127.0.0.1
    nginx_required_initially: false
    initial_operator_access: ssh_tunnel_only
    force_ssl_initially: false
    linux_user: thesis-record
    deploy_path: /var/www/thesis-record/thesis_record_app
    env_file_path: /etc/thesis-record/thesis-record.env
    backup_manifest_path: /var/backups/thesis-record/thesis-record
    admin_bootstrap: one_time_environment_backed_task
    admin_bootstrap_env:
      email: THESIS_RECORD_ADMIN_EMAIL
      password: THESIS_RECORD_ADMIN_PASSWORD
      role: THESIS_RECORD_ADMIN_ROLE
      override: THESIS_RECORD_BOOTSTRAP_OVERRIDE
    admin_bootstrap_default_role: research_admin
    admin_bootstrap_minimum_password_length: 16
    process_supervision: systemd_or_equivalent
    web_unit_name: thesis-record-web.service
    sidekiq_unit_name: thesis-record-sidekiq.service
    sidekiq_process_name: thesis-record-sidekiq
    redis_namespace: thesis-record-production
    backup_required_before_private_ingestion: true
    restore_test_required_before_private_ingestion: true
    health_check_path: /up
    public_ingestion_enabled_default: false
    private_ingestion_enabled_default: false
    production_data_on_laptop_allowed: false
    local_database_role: dev_only_rehearsal_not_system_of_record
    canonical_data_promotion_default: disabled
    canonical_data_promotion_requires:
      - production_postgresql_target
      - pre_promotion_backup
      - migration_manifest
      - row_count_reconciliation
      - post_promotion_health_check
    deploy_or_push_authority_default: none

  public_ingestion_v1:
    first_dataset: susb_us_state_annual_public_file
    public_file_fetch_enabled_default: false
    metric_computation_enabled_default: false
    claim_status_effect_default: unchanged
    raw_public_file_git_allowed: false
    raw_public_file_storage_zone: private_file_storage
    metadata_storage_zone: production_postgresql
    default_source_status: ingestion_scaffold_ready
    default_manifest_status: schema_scaffold_ready
    susb_us_state_annual:
      default_year: 2022
      source_name: Census SUSB U.S./state annual public file
      source_kind: census_susb_public_file
      source_url: https://www2.census.gov/programs-surveys/susb/tables/2022/us_state_6digitnaics_2022.txt
      record_layout_url: https://www2.census.gov/programs-surveys/susb/technical-documentation/record_layout_us_and_state_2007_to_present.txt
      local_raw_path_template: data/raw/susb/%{year}/us_state_6digitnaics_%{year}.txt
      manifest_name_template: SUSB U.S./state annual %{year} public-file manifest
      schema_version: susb_us_state_annual_2007_present_v1
      naics_vintage: "2017"
      geography_grain: us_state
      row_grain:
        - STATE
        - NAICS
        - ENTRSIZE
      expected_header:
        - STATE
        - NAICS
        - ENTRSIZE
        - FIRM
        - ESTB
        - EMPL
        - EMPLFL_N
        - PAYR
        - PAYRFL_N
        - RCPT
        - RCPTFL_N
        - STATEDSCR
        - NAICSDSCR
        - ENTRSIZEDSCR
      required_columns:
        - STATE
        - NAICS
        - ENTRSIZE
        - FIRM
        - ESTB
        - EMPL
        - PAYR
        - EMPLFL_N
        - PAYRFL_N
        - STATEDSCR
        - NAICSDSCR
        - ENTRSIZEDSCR
      optional_economic_census_columns:
        - RCPT
        - RCPTFL_N
      allowed_noise_flags:
        - G
        - H
        - J
        - D
        - S
      metric_definitions:
        susb_employer_firm_count:
          name: SUSB employer firm count
          formula_status: draft_disabled
          formula: "Source field FIRM at source grain; no aggregation in scaffold."
          limitations: "Employer firms only. No AI, nonemployer, management-layer, transaction-cost, one-person-firm, or claim-support interpretation."
        susb_employer_establishment_count:
          name: SUSB employer establishment count
          formula_status: draft_disabled
          formula: "Source field ESTB at source grain; no aggregation in scaffold."
          limitations: "Employer establishments only. Establishments are not firms, nodes, nonemployers, or management layers."
        susb_employment:
          name: SUSB employer employment
          formula_status: draft_disabled
          formula: "Source field EMPL at source grain with EMPLFL_N preserved; no aggregation in scaffold."
          limitations: "Employer employment with noise flags. Does not identify remote work, contractors, managers, AI use, or support-staff ratios."
        susb_annual_payroll_thousand:
          name: SUSB annual payroll in thousands
          formula_status: draft_disabled
          formula: "Source field PAYR at source grain with PAYRFL_N preserved; no inflation adjustment or aggregation in scaffold."
          limitations: "Annual payroll for employer firms only. Requires price adjustment and comparability design before analysis."
        susb_receipts_thousand_economic_census_year:
          name: SUSB receipts in thousands for economic-census years
          formula_status: draft_disabled
          formula: "Source field RCPT at source grain with RCPTFL_N preserved where present; no aggregation in scaffold."
          limitations: "Receipts are available only for years ending in 2 and 7 in the verified layout. Not a productivity or thesis-support measure by itself."
      metric_computation_design_v1:
        status: design_only_disabled
        eligible_enterprise_size_codes:
          - "01"
        grain: source_native_context
        dimension_fields:
          - year
          - state_code
          - naics_code
        enterprise_size_handling: "Use only ENTRSIZE=01 Total for first-pass observations to avoid double-counting overlapping size buckets."
        evidence_class: employer_side_context_only
        claim_status_effect: unchanged
        allowed_metric_statuses:
          - staged_context
          - quality_review_required
          - blocked_noise_or_suppression
        noise_flag_rules:
          G: staged_context
          H: staged_context
          J: quality_review_required
          D: blocked_noise_or_suppression
          S: blocked_noise_or_suppression
        first_pass_metric_keys:
          - susb_employer_firm_count
          - susb_employer_establishment_count
          - susb_employment
          - susb_annual_payroll_thousand
          - susb_receipts_thousand_economic_census_year
        prohibited_computation:
          - ratios
          - trends
          - aggregation
          - productivity_measures
          - ai_or_node_interpretation
          - claim_support
          - exports
      quality_review_policy_v1:
        status: policy_only_no_review_state
        source_status_required:
          - raw_file_validated
        manifest_status_allowed:
          - raw_file_validated
          - staging_rows_loaded
        schema_status_allowed:
          - verified_record_layout_scaffold
        eligible_observation_statuses:
          staged_context: reviewed_context
          quality_review_required: reviewed_with_high_noise
          blocked_noise_or_suppression: excluded_noise_or_suppression
        final_review_statuses:
          - reviewed_context
          - reviewed_with_high_noise
          - excluded_noise_or_suppression
          - excluded_policy_violation
          - needs_manual_review
        required_quality_metadata:
          - source_table
          - source_row_id
          - source_row_hash
          - metric_key
          - metric_status_reason
          - claim_status_effect
          - ratios_computed
          - trends_computed
          - aggregation_computed
          - exports_created
          - claim_support_authorized
          - guardrail
        hard_false_flags:
          ratios_computed: false
          trends_computed: false
          aggregation_computed: false
          exports_created: false
          claim_support_authorized: false
        manual_review_required_for:
          - missing_source_row
          - missing_source_row_hash
          - missing_required_dimensions
          - unknown_metric_key
          - unsupported_metric_status
          - high_noise_status
        prohibited_review_effects:
          - claim_support
          - export_authorization
          - thesis_interpretation
          - ai_or_node_evidence
          - aggregation_authorization
          - trend_authorization
        review_storage_recommendation: metric_quality_reviews
