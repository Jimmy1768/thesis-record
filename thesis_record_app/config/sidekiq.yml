<%
require "yaml"

policy_path = ENV.fetch("THESIS_RECORD_POLICY_PATH", File.expand_path("config/thesis_record_policy.yml", Dir.pwd))
policy = YAML.safe_load_file(policy_path).fetch("shared")
scheduled_jobs = policy.fetch("scheduler").fetch("jobs")
%>

:concurrency: <%= ENV.fetch("SIDEKIQ_CONCURRENCY", 5) %>
:queues:
  - default
  - evidence_collection
  - evidence_validation
  - metrics
  - exports
  - maintenance

:scheduler:
  :schedule:
<% scheduled_jobs.each do |job_name, job| %>
    <%= job_name %>:
      cron: "<%= job.fetch("cron") %>"
      class: "<%= job.fetch("class_name") %>"
      queue: <%= job.fetch("queue") %>
      description: "<%= job.fetch("description") %>"
<% end %>
