version: v0
status: prose_review_scaffold
thesis_slug: operator-node-economics
approval_status: unapproved
purpose: >
  Make the v0 prose gate concrete before any public prose approval. This file
  defines what must be checked for the internal v0 record; it does not import
  paper/draft.md, approve public publication text, approve claims, approve
  forecasts, or make v0 public.
review_effect: no_approval_no_publication_no_claim_support
required_artifacts:
  - theses/operator-node-economics/publication/v0.md
  - theses/operator-node-economics/publication/v0_claim_set.yml
  - theses/operator-node-economics/publication/v0_forecast_set.yml
  - theses/operator-node-economics/publication/v0_indicator_universe.yml
  - theses/operator-node-economics/publication/v0_source_truth_review.yml
  - theses/operator-node-economics/publication/v0_prohibited_foundations_review.yml
held_back_artifacts:
  - theses/operator-node-economics/paper/draft.md
review_criteria:
  archived_draft_not_imported:
    status: pending_human_review
    requirement: The archived paper draft must remain absent until a separate import/rewrite decision.
  internal_record_not_public_prose:
    status: pending_human_review
    requirement: v0.md may serve as the internal v0 control record but cannot be treated as final public thesis prose.
  no_claim_or_forecast_approval:
    status: pending_human_review
    requirement: Prose review cannot approve claim status, forecast status, prediction links, or thesis verdicts.
  source_truth_boundaries_visible:
    status: pending_human_review
    requirement: Final prose must preserve source-truth, falsifier, indirect-proxy, and prohibited-foundation boundaries.
  no_baseline_as_proof:
    status: pending_human_review
    requirement: Baseline SUSB, BFS, and BDS context cannot be written as proof that Operator Nodes exist.
  no_public_release_effect:
    status: pending_human_review
    requirement: Passing this scaffold does not authorize public release.
prohibited_effects:
  - prose_review_acceptance
  - source_truth_review_acceptance
  - prohibited_foundations_review_acceptance
  - claim_status_change
  - forecast_status_change
  - prediction_link_creation
  - claim_review_creation
  - public_publication
  - paper_prose_publication
  - canonical_ingestion
  - thesis_verdict
human_review_required_before:
  - importing_or_rewriting_archived_draft
  - accepting_prose_review
  - approving_public_v0
  - publishing_any_paper_text
