version: v0
status: candidate_indicator_universe
thesis_slug: operator-node-economics
approval_status: unapproved
purpose: >
  Define the v0 target-value universe before future checkpoints interpret
  indirect evidence. V0 does not assert that Operator Nodes exist. Direct
  Operator Node evidence is expected to be unavailable at baseline and must
  emerge, if at all, at later checkpoints.
current_baseline_boundary:
  production_coverage: SUSB, BFS, and BDS public-source context only
  direct_operator_node_evidence_at_v0: absent
  private_or_platform_data_at_v0: absent
  interpretation_effect: no_claim_support
checkpoint_ladder:
  v0:
    role: internal_baseline_precommitment
    date_basis: "2026-06-15 UTC"
  v1:
    role: 3_year_public_checkpoint
    expected_signal_strength: early_noisy_signal
    target_period: "2029-Q2"
  v2:
    role: 5_year_signal_strength_checkpoint
    expected_signal_strength: decide_wrong_or_keep_tracking
    target_period: "2031-Q2"
  v3:
    role: 10_year_confirmation_checkpoint
    expected_signal_strength: peer_review_candidate_if_survives
    target_period: "2036-Q2"
evidence_strength_classes:
  direct_future: Direct evidence that Operator Node-like production units exist.
  indirect_baseline: Public context available at v0 but not claim support.
  weak_proxy: Directionally relevant proxy with high confounding risk.
  private_data_required: Requires firm, platform, payment, or workflow records.
  third_party_required: Requires external vendor, marketplace, or survey data.
  unavailable_currently: Not available at v0 and not inferable from current data.
indicator_categories:
  direct_operator_node_emergence:
    category_role: future_direct_detection
    current_production_coverage: not_covered
    indicators:
      - id: ON-DIRECT-001
        target_value: identifiable_one_human_ai_native_firm
        expected_direction_if_thesis_right: count_increases_by_v2_and_v3
        checkpoint_relevance: [v1, v2, v3]
        evidence_strength_class: direct_future
        source_candidates: [case_studies, platform_records, company_filings, founder_interviews]
        linked_forecasts: [TCE-P001, TCE-P002, TCE-P008]
        confounders: [ordinary_microfirms, agencies_rebranded_as_ai, contractor_teams_hidden_behind_one_brand]
        falsification_or_adverse_condition: no_identifiable_cases_by_v3_despite_broad_ai_diffusion
      - id: ON-DIRECT-002
        target_value: autonomous_multi_function_workflow_owned_by_one_operator
        expected_direction_if_thesis_right: workflow_scope_expands
        checkpoint_relevance: [v2, v3]
        evidence_strength_class: private_data_required
        source_candidates: [workflow_logs, agent_run_records, repo_activity, CRM_and_billing_records]
        linked_forecasts: [TCE-P004, TCE-P008]
        confounders: [outsourced_staff, hidden_manual_ops, templated_SaaS_without_autonomy]
        falsification_or_adverse_condition: scope_expansion_requires_more_humans_not_more_automation
  diffusion_indicators:
    category_role: AI_capability_and_use_diffusion
    current_production_coverage: partial
    indicators:
      - id: ON-DIFF-001
        target_value: AI_tool_adoption_by_small_firms_and_independent_workers
        expected_direction_if_thesis_right: adoption_rises_before_direct_operator_node_counts
        checkpoint_relevance: [v1, v2]
        evidence_strength_class: third_party_required
        source_candidates: [BLS_surveys, Census_BTOS, private_SaaS_surveys, platform_usage_reports]
        linked_forecasts: [TCE-P001, TCE-P004]
        confounders: [novelty_usage, bundle_inclusion, low_productive_use]
        falsification_or_adverse_condition: adoption_rises_without_productivity_or_scope_change
      - id: ON-DIFF-002
        target_value: AI_exposed_business_applications_and_formations
        expected_direction_if_thesis_right: high_propensity_and_AI_adjacent_applications_rise
        checkpoint_relevance: [v1, v2, v3]
        evidence_strength_class: weak_proxy
        current_production_coverage: partial
        source_candidates: [Census_BFS, NAICS_AI_exposure_crosswalks, state_business_registries]
        linked_forecasts: [TCE-P009, TCE-P010]
        confounders: [macro_cycle, tax_changes, registration_noise, sector_reclassification]
        falsification_or_adverse_condition: formation_growth_concentrates_only_in_ordinary_employer_firms
  substitution_indicators:
    category_role: labor_and_service_substitution
    current_production_coverage: not_covered
    indicators:
      - id: ON-SUB-001
        target_value: support_function_labor_share
        expected_direction_if_thesis_right: declines_in_AI_exposed_small_firms
        checkpoint_relevance: [v2, v3]
        evidence_strength_class: private_data_required
        source_candidates: [payroll_data, job_postings, firm_surveys, occupational_employment_data]
        linked_forecasts: [TCE-P002, TCE-P005]
        confounders: [offshoring, layoffs_from_demand_shocks, outsourcing]
        falsification_or_adverse_condition: support_headcount_scales_linearly_with_revenue
      - id: ON-SUB-002
        target_value: outsourced_service_spend_per_revenue
        expected_direction_if_thesis_right: decreases_for_repetitive_coordination_services
        checkpoint_relevance: [v2, v3]
        evidence_strength_class: private_data_required
        source_candidates: [accounting_exports, procurement_records, vendor_spend_data]
        linked_forecasts: [TCE-P004, TCE-P006]
        confounders: [service_price_changes, software_subscriptions_replacing_services]
        falsification_or_adverse_condition: AI_adoption_increases_external_service_dependency
  transaction_cost_indicators:
    category_role: search_contracting_monitoring_and_dispute_costs
