version: v0
status: prohibited_foundations_review_scaffold
thesis_slug: operator-node-economics
approval_status: unapproved
purpose: >
  Make the prohibited-foundations gate concrete before any public v0 review.
  This file defines what must be checked; it does not approve prose, source
  truth, claims, forecasts, publication, or thesis verdicts.
review_effect: no_approval_no_publication_no_claim_support
allowed_foundations:
  - economics
  - organizational_theory
  - history
  - technology
  - empirical_evidence
prohibited_foundation_classes:
  - philosophical_or_religious_foundations
required_artifacts:
  - theses/operator-node-economics/source_truth/prohibited_foundations.md
  - theses/operator-node-economics/source_truth/research_contract.md
scan_paths:
  - theses/operator-node-economics/publication/v0.md
  - theses/operator-node-economics/publication/v0_claim_set.yml
  - theses/operator-node-economics/publication/v0_forecast_set.yml
  - theses/operator-node-economics/publication/v0_indicator_universe.yml
  - theses/operator-node-economics/source_truth/core_hypothesis.md
  - theses/operator-node-economics/source_truth/falsifiability_contract.md
  - theses/operator-node-economics/source_truth/operator_node_definition.md
review_criteria:
  allowed_foundations_only:
    status: pending_human_review
    requirement: v0 framing must rest on economics, organizational theory, history, technology, and empirical evidence.
  prohibited_foundation_classes_listed:
    status: pending_human_review
    requirement: Philosophical or religious foundations must be listed as prohibited foundation classes.
  analogy_not_evidence:
    status: pending_human_review
    requirement: Any later-discovered philosophical or religious parallel cannot be used as evidence or motivation for the thesis.
  no_manifesto_or_prestige_frame:
    status: pending_human_review
    requirement: v0 must avoid manifesto, spiritual, prestige, award, or historical-destiny framing.
  no_publication_without_human_review:
    status: pending_human_review
    requirement: Passing this scaffold does not approve public prose or publication.
prohibited_effects:
  - prohibited_foundations_review_acceptance
  - source_truth_review_acceptance
  - claim_status_change
  - forecast_status_change
  - prediction_link_creation
  - claim_review_creation
  - public_publication
  - paper_prose_publication
  - canonical_ingestion
  - thesis_verdict
human_review_required_before:
  - accepting_prohibited_foundations_review
  - approving_public_v0
  - approving_any_paper_prose
