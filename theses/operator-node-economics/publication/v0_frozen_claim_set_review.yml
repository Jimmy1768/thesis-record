version: v0
status: frozen_claim_set_review_scaffold
thesis_slug: operator-node-economics
approval_status: unapproved
purpose: >
  Make the frozen claim-set gate concrete before any claim inventory approval.
  This file defines what must be checked; it does not approve claim status,
  source-truth status, publication prose, prediction links, or thesis verdicts.
review_effect: no_approval_no_publication_no_claim_support
required_artifacts:
  - theses/operator-node-economics/publication/v0_claim_set.yml
  - theses/operator-node-economics/publication/v0_source_truth_review.yml
  - theses/operator-node-economics/publication/v0_prohibited_foundations_review.yml
required_claim_ids:
  - TCE-CLAIM-001
  - TCE-CLAIM-002
  - TCE-CLAIM-003
  - TCE-CLAIM-004
  - TCE-CLAIM-005
  - TCE-CLAIM-006
  - TCE-CLAIM-007
  - TCE-CLAIM-008
  - TCE-CLAIM-009
  - TCE-CLAIM-010
  - TCE-CLAIM-011
  - TCE-CLAIM-012
  - TCE-CLAIM-013
  - TCE-CLAIM-014
  - TCE-CLAIM-015
review_criteria:
  claim_inventory_complete:
    status: pending_human_review
    requirement: The v0 claim set must contain the expected TCE-CLAIM-001 through TCE-CLAIM-015 candidate IDs.
  all_claims_unapproved:
    status: pending_human_review
    requirement: Every claim must remain candidate_unapproved until a human approval changes the review state.
  source_truth_refs_present:
    status: pending_human_review
    requirement: Every claim must reference source-truth files before prose or claim approval.
  review_notes_present:
    status: pending_human_review
    requirement: Every claim must include a review note explaining the boundary or risk.
  no_automatic_promotion:
    status: pending_human_review
    requirement: The claim set must keep automatic promotion disabled and claim_status_effect unchanged.
prohibited_effects:
  - frozen_claim_set_review_acceptance
  - claim_status_change
  - forecast_status_change
  - prediction_link_creation
  - claim_review_creation
  - public_publication
  - paper_prose_publication
  - canonical_ingestion
  - thesis_verdict
human_review_required_before:
  - accepting_frozen_claim_set_review
  - approving_any_claim_inventory
  - changing_claim_status
  - creating_prediction_links
