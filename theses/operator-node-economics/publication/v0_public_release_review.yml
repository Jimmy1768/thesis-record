version: v0
status: public_release_review_scaffold
thesis_slug: operator-node-economics
approval_status: unapproved
purpose: >
  Make the public-release gate concrete before any public v0 approval. This
  file defines release prerequisites; it does not approve publication, enable a
  public web surface, or change claim/forecast status.
review_effect: no_approval_no_publication_no_claim_support
required_artifacts:
  - theses/operator-node-economics/publication/v0.md
  - theses/operator-node-economics/publication/v0_timeline.yml
  - theses/operator-node-economics/publication/v0_approval_packet.yml
  - theses/operator-node-economics/publication/v0_prose_review.yml
  - theses/operator-node-economics/publication/v0_source_truth_review.yml
  - theses/operator-node-economics/publication/v0_prohibited_foundations_review.yml
release_prerequisites:
  - source_truth_review_accepted
  - prohibited_foundations_review_accepted
  - prose_review_accepted
  - frozen_claim_set_review_accepted
  - frozen_forecast_set_review_accepted
  - public_path_verified
  - no_claim_or_forecast_auto_promotion
review_criteria:
  release_status_not_public:
    status: pending_human_review
    requirement: The current v0 state must remain not public until explicit release approval.
  public_path_declared:
    status: pending_human_review
    requirement: The target path must remain /thesis/operator-node-economics under sourcegridlabs.com/thesis.
  approval_packet_controls_release:
    status: pending_human_review
    requirement: Public release requires approval-packet gate status changes, not only prose edits.
  no_nginx_or_web_surface_assumption:
    status: pending_human_review
    requirement: Passing this scaffold does not require or imply a live public web route yet.
  no_claim_or_forecast_approval:
    status: pending_human_review
    requirement: Public release review cannot approve claim status, forecast status, or thesis verdicts by itself.
prohibited_effects:
  - public_release_review_acceptance
  - prose_review_acceptance
  - claim_status_change
  - forecast_status_change
  - prediction_link_creation
  - claim_review_creation
  - public_publication
  - paper_prose_publication
  - canonical_ingestion
  - thesis_verdict
human_review_required_before:
  - accepting_public_release_review
  - changing_public_release_status
  - enabling_public_route
  - publishing_v0_text
